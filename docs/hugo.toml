baseURL = "/"
languageCode = "en-us"
title = "AfterTouch"

enableRobotsTXT = true
enableGitInfo = true
disablePathToLower = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.112.0"
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[params]
  description = "Keep your Bose SoundTouch speakers alive after the cloud shutdown"
  displayUpdatedDate = true
  dateFormat = "January 2, 2006"

  [params.search]
    enable = true
    type = "flexsearch"

  [params.search.flexsearch]
    index = "content"
    tokenize = "forward"

  [params.navbar]
    displayTitle = true
    displayLogo = true

    [params.navbar.logo]
      path   = "images/logo.svg"
      width  = "24"
      height = "24"

  [params.footer]
    enable = true
    displayCopyright = false
    displayPoweredBy = false

  [params.blog]
    [params.blog.list]
      displayTags = true
      sortBy      = "date"
      sortOrder   = "desc"

[[menu.main]]
  identifier = "docs"
  name = "Docs"
  pageRef = "/docs"
  weight = 1

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  pageRef = "/blog"
  weight = 2

[[menu.main]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/gesellix/Bose-SoundTouch"
  weight = 3
  [menu.main.params]
    type = "icon"
    icon = "github"

[[menu.main]]
  identifier = "sponsor"
  name = "Sponsor"
  url = "/sponsor"
  weight = 4
  [menu.main.params]
    type = "icon"
    icon = "heart"
